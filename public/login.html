<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Strady.Budget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/jpeg" href="S-fav-icon.jpeg">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased h-screen flex items-center justify-center">

    <div class="max-w-md w-full px-6">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-10 text-center">
            <!-- logo -->
            <div class="mb-8">
                <div class="logo text-3xl justify-center">
                    <span class="logo-trady">Strady</span><span class="logo-dot">.</span><span class="logo-app"><i class="fa-solid fa-wallet"></i>Budget</span>
                </div>
                <p class="text-slate-500 mt-2">Gérez votre budget simplement et efficacement.</p>
            </div>

            <h1 class="text-xl font-bold text-slate-800 mb-6">Bienvenue</h1>
            
            <button id="btn-google-login" class="w-full flex items-center justify-center gap-3 bg-white border border-slate-300 text-slate-700 px-4 py-3 rounded-xl font-semibold hover:bg-slate-50 transition-all shadow-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5" alt="Google">
                Continuer avec Google
            </button>

            <div class="mt-8 pt-8 border-t border-slate-100">
                <p class="text-xs text-slate-400 leading-relaxed">
                    En vous connectant, vous acceptez nos conditions d'utilisation et notre politique de confidentialité.
                </p>
            </div>
        </div>
        
        <p class="text-center text-slate-400 text-sm mt-8">
            &copy; 2026 Strady.Budget. Tous droits réservés.
        </p>
    </div>

    <script type="module">
        import { login, onUserChanged } from './js/auth.js';

        // If user is already logged in, redirect to dashboard
        onUserChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        document.getElementById('btn-google-login').addEventListener('click', async () => {
            try {
                await login();
                // Redirection will be handled by onUserChanged
            } catch (error) {
                console.error("Login failed", error);
                alert("Erreur lors de la connexion. Veuillez réessayer.");
            }
        });
    </script>
</body>
</html>
